upstream nextjs {
    server app:3000;
}

upstream websocket {
    server app:3333;
}

# HTTP → redirect to HTTPS
server {
    listen 80;
    server_name vocabpop.app www.vocabpop.app;
    return 301 https://vocabpop.app$request_uri;
}

# www → redirect to non-www
server {
    listen 443 ssl;
    server_name www.vocabpop.app;

    ssl_certificate /etc/letsencrypt/live/vocabpop.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/vocabpop.app/privkey.pem;

    return 301 https://vocabpop.app$request_uri;
}

# Main HTTPS server
server {
    listen 443 ssl;
    server_name vocabpop.app;

    ssl_certificate /etc/letsencrypt/live/vocabpop.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/vocabpop.app/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    # WebSocket
    location /ws {
        proxy_pass http://websocket/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400;
    }

    # Next.js
    location / {
        proxy_pass http://nextjs;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
