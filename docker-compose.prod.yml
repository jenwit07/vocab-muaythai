services:
  mongodb:
    image: mongodb/mongodb-atlas-local:8.0
    hostname: mongodb
    restart: unless-stopped
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    networks:
      - app

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
      - "3333:3333"
    environment:
      - NODE_ENV=production
      - MONGODB_URI=mongodb://mongodb:27017/?directConnection=true
      - MONGODB_DB=toeic_vocab
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - HOSTNAME=0.0.0.0
    depends_on:
      - mongodb
    networks:
      - app

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - app
    networks:
      - app

volumes:
  mongodb_data:
  mongodb_config:

networks:
  app:
